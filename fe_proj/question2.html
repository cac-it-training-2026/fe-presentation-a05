<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドロップダウン穴埋めクイズ</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.8;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .quiz-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        select {
            padding: 5px;
            font-size: 16px;
            margin: 0 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        /* 正解・不正解の視覚フィードバック用スタイル */
        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Web技術クイズ</h2>
    <p>
        Webページの骨組みを作るのは
        <!-- data-answer 属性に正解の value を仕込んでおきます -->
        <select class="quiz-select" data-answer="html">
            <option value="">--選択--</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
        </select>
        です。
        見た目やデザインを整えるには
        <select class="quiz-select" data-answer="css">
            <option value="">--選択--</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
        </select>
        を使用し、ボタンをクリックしたときなどの「動き」をつけるには
        <select class="quiz-select" data-answer="js">
            <option value="">--選択--</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
        </select>
        を使います。
    </p>

    <button onclick="checkAnswers()" class="answer_button">答え合わせ</button>
    <div id="result"></div>
   	<div class="answer-content" id="answer" hidden>
        <p class="correct-answer">
          	<strong>正解：2. Hyper Text Markup Language</strong>
        </p>
        <p class="explanation">
        	<strong>解説：</strong><br />
            	HTMLは「Hyper Text Markupです
            	Language（ハイパーテキスト・マークアップ・ランゲージ）」の略です。Webページの構造を作成するための言語として使用されます。
            	<br><a href="index.html">トップページへ</a>
        </p>
        </div>
</div>

<script>
function checkAnswers() {
    // すべてのセレクトボックスを取得
    const selects = document.querySelectorAll('.quiz-select');
    let score = 0;

    selects.forEach(select => {
        const userAnswer = select.value;
        const correctAnswer = select.getAttribute('data-answer');

        // 一度クラスをリセット
        select.classList.remove('correct', 'incorrect');

        if (userAnswer === correctAnswer) {
            select.classList.add('correct');
            score++;
        } else {
            select.classList.add('incorrect');
        }
    });

    // 結果の表示
    const resultDiv = document.getElementById('result');
    resultDiv.textContent = `${selects.length}問中、${score}問正解です！`;
    const answer = document.getElementById("answer");
    answer.removeAttribute('hidden');
}
</script>

</body>
</html>
